name: camerax_android
description: A new Flutter plugin project.
version: 0.0.1
homepage: "https://github.com/yanshouwang/camerax"

environment:
  sdk: ">=2.17.6 <3.0.0"
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  camerax_core:
    path: ../camerax_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  pigeon: ^3.2.7

flutter:
  plugin:
    implements: camerax
    platforms:
      android:
        dartPluginClass: CameraPlugin
        package: dev.yanshouwang.camerax
        pluginClass: CameraPlugin
