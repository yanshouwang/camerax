name: camerax_ios
description: "iOS implementation of the camerax plugin."
version: 1.2.1
repository: https://github.com/yanshouwang/camerax
issue_tracker: https://github.com/yanshouwang/camerax/issues
topics:
  - camera
  - camerax

resolution: workspace

environment:
  sdk: ^3.10.9
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  camerax_platform_interface: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^27.1.0

flutter:
  plugin:
    implements: camerax
    platforms:
      ios:
        pluginClass: CameraXiOSPlugin
        dartPluginClass: CameraXiOSPlugin
